- name: Install yt-dlp dependencies
  run: |
    sudo apt update
    sudo apt install -y ffmpeg nodejs npm
    python3 -m pip install -U yt-dlp
    yt-dlp --version

- name: Install JS runtime for yt-dlp
  run: |
    npm install -g deno

- name: Test
  run: |
    yt-dlp \
    --cookies cookies.txt \
    --js-runtimes deno \
    --no-check-certificates \
    --force-ipv4 \
    --extractor-args "youtube:player_client=web" \
    -F \
    "https://youtu.be/-6a9RSBeADw?si=x2jOGjwY3exVVADnv"
